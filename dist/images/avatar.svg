<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="320"
  height="320"
  viewBox="0 0 320 320"
  role="img"
  aria-label="Avatar placeholder"
>

  <defs>
    <!-- Clip pour l'image -->
    <clipPath id="bodyClip">
      <rect x="40" y="180" width="240" height="110" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b122a"/>

  <!-- Head -->
  <circle
    cx="160"
    cy="110"
    r="60"
    fill="#020617"
    stroke="#1f2937"
    stroke-width="2"
  />

  <!-- Body border -->
  <rect
    x="40"
    y="180"
    width="240"
    height="110"
    rx="12"
    fill="#020617"
    stroke="#1f2937"
    stroke-width="2"
  />

  <!-- Initials (fallback si image absente) -->
  <text
    x="160"
    y="140"
    text-anchor="middle"
    fill="#38bdf8"
    font-family="Arial, Helvetica, sans-serif"
    font-size="72"
    dominant-baseline="middle"
  >
    MD
  </text>

  <!-- Image clippée -->
  <image
    x="40"
    y="180"
    width="240"
    height="110"
    href="./moustaphaDrame.jpg"
    clip-path="url(#bodyClip)"
    preserveAspectRatio="xMidYMid slice"
  />

</svg>
